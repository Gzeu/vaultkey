name: VaultKey CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run linter (ruff)
        run: ruff check wallet/ tests/

      - name: Run type checker (mypy)
        run: mypy wallet/ --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=wallet \
            --cov-report=term-missing \
            --cov-report=xml \
            --tb=short

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests
          name: vaultkey-coverage

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit security scan
        run: |
          bandit -r wallet/ \
            -c pyproject.toml \
            --severity-level medium \
            --format txt

  docs:
    name: Check docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Verify required files exist
        run: |
          test -f LICENSE
          test -f CHANGELOG.md
          test -f SECURITY.md
          test -f CONTRIBUTING.md
          test -f mkdocs.yml
          echo "OK: required docs present"

      - name: Build MkDocs site (strict)
        run: mkdocs build --strict

  release-check:
    name: Release Readiness
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [test, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build twine hatchling

      - name: Build distribution
        run: python -m build

      - name: Check distribution integrity
        run: twine check dist/*
