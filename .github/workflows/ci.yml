# VaultKey — Continuous Integration
# Runs on: push to main/develop, all PRs
# Jobs: lint (ruff), typecheck (mypy), test (pytest), security (bandit + pip-audit)

name: CI

on:
  push:
    branches: [main, develop, 'feat/**', 'fix/**']
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff
      - run: ruff check wallet/
      - run: ruff format --check wallet/

  typecheck:
    name: Typecheck (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -e . mypy
      - run: mypy wallet/ --exclude 'wallet/ui/' --ignore-missing-imports

  test:
    name: Tests — Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      - name: Install deps
        run: pip install -e .[dev]
      - name: Run tests
        run: pytest tests/ -x -q

  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install bandit pip-audit
      - name: Bandit SAST
        run: bandit -r wallet/ -c pyproject.toml -ll
      - name: pip-audit dependency scan
        run: pip-audit --requirement <(pip freeze) || true
