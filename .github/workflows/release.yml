name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  # ── 1. Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install & test
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v --tb=short

  # ── 2. Build sdist + wheel ─────────────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: pip install build hatchling twine
      - name: Extract version
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Build
        run: python -m build
      - name: Verify
        run: twine check dist/*
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/
          retention-days: 5

  # ── 3. GitHub Release ──────────────────────────────────────────────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/
      - name: Extract changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NOTES=$(awk "/^## \\[${VERSION}\\]/,/^## \\[/" CHANGELOG.md \
            | head -n -1 | tail -n +2)
          [ -z "$NOTES" ] && NOTES="See CHANGELOG.md for details."
          echo "$NOTES" > release_notes.txt
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VaultKey ${{ github.ref_name }}"
          body_path: release_notes.txt
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
          make_latest: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── 4. Publish to PyPI via PYPI_API_TOKEN (github-pages environment) ──────
  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, github-release]
    environment:
      name: github-pages
      url: https://pypi.org/project/vaultkey/${{ needs.build.outputs.version }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # ── 5. Deploy MkDocs to GitHub Pages ─────────────────────────────────────────
  deploy-docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: pypi-publish
    environment:
      name: github-pages
      url: https://gzeu.github.io/vaultkey
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install MkDocs
        run: pip install mkdocs-material
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Deploy
        run: mkdocs gh-deploy --force --clean
