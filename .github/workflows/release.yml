name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write      # create GitHub Release
  id-token: write      # PyPI Trusted Publisher (OIDC)

jobs:
  # ── 1. Run full test suite before releasing ────────────────────────────────
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install & test
        run: |
          pip install -e ".[dev]"
          pytest tests/ -v --tb=short

  # ── 2. Build sdist + wheel ─────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history for changelog extraction

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: pip install build hatchling twine

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build sdist and wheel
        run: python -m build

      - name: Verify distribution
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/
          retention-days: 5

  # ── 3. Create GitHub Release with auto-generated notes ────────────────────
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          # Extract section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \\[${VERSION}\\]/,/^## \\[/" CHANGELOG.md \
            | head -n -1 \
            | tail -n +2)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          fi
          # Write to file to avoid quoting issues
          echo "$NOTES" > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VaultKey ${{ github.ref_name }}"
          body_path: release_notes.txt
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
          make_latest: true
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── 4. Publish to PyPI via Trusted Publisher (OIDC — no token needed) ──────
  pypi-publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: github-release
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted Publisher = no PYPI_API_TOKEN needed
        # Configure at: https://pypi.org/manage/project/vaultkey/settings/publishing/

  # ── 5. Deploy docs after successful release ────────────────────────────────
  deploy-docs:
    name: Deploy docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: pypi-publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Configure git for gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs
        run: mkdocs gh-deploy --force --clean
