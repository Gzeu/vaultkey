# VaultKey — Release Build Pipeline
# Triggers on:
#   - Push of a version tag: v* (e.g. v2.0.0, v2.0.0-rc1)
#   - Manual dispatch (for testing)
#
# Matrix: Windows (.exe), Linux (.AppImage + raw ELF), macOS (.app + DMG unsigned)
# Artifacts are uploaded per-OS and attached to the GitHub Release.

name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 2.0.0)'
        required: true
        default: '2.0.0'
      targets:
        description: 'Build targets: cli, gui, all'
        required: true
        default: 'all'

jobs:
  build:
    name: Build — ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──────────────────────────────────────────────────────
          - os: windows-latest
            target: cli
            artifact_name: vaultkey-windows-cli
            binary_path: dist/windows/vaultkey.exe

          - os: windows-latest
            target: gui
            artifact_name: vaultkey-windows-gui
            binary_path: dist/windows/vaultkey-gui.exe

          # ── Linux ────────────────────────────────────────────────────────
          - os: ubuntu-22.04
            target: cli
            artifact_name: vaultkey-linux-cli
            binary_path: dist/linux/vaultkey

          - os: ubuntu-22.04
            target: gui
            artifact_name: vaultkey-linux-appimage
            binary_path: dist/linux/VaultKey-*.AppImage

          # ── macOS ────────────────────────────────────────────────────────
          - os: macos-13
            target: cli
            artifact_name: vaultkey-macos-cli
            binary_path: dist/macos/vaultkey

          - os: macos-13
            target: gui
            artifact_name: vaultkey-macos-app
            binary_path: dist/macos/VaultKey.app

    steps:
      # ── Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Python setup ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── OS-specific dependencies ────────────────────────────────────────
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libfuse2 \
            libglib2.0-dev \
            libgtk-3-dev \
            python3-tk \
            tk-dev \
            upx-ucl

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install upx || true
          # create-dmg is optional; skip on CI unless you need .dmg
          # brew install create-dmg

      - name: Install Windows dependencies (UPX)
        if: runner.os == 'Windows'
        run: |
          choco install upx --yes --no-progress || echo "UPX install skipped"
        shell: pwsh

      # ── Python deps ────────────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e .
          pip install pyinstaller>=6.6

      # ── Build ──────────────────────────────────────────────────────────
      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq 'tag') {
              "${{ github.ref_name }}" -replace '^v',''
          } else {
              "${{ github.event.inputs.version }}"
          }
          .\build\scripts\build-windows.ps1 -Target ${{ matrix.target }} -Version $version

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//' || echo "${{ github.event.inputs.version }}")
          bash build/scripts/build-linux.sh ${{ matrix.target }} "$VERSION"

      - name: Build (macOS)
        if: runner.os == 'macOS'
        env:
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//' || echo "${{ github.event.inputs.version }}")
          bash build/scripts/build-macos.sh ${{ matrix.target }} "$VERSION"

      # ── macOS codesign (Developer ID cert) ─────────────────────────────
      - name: Import macOS certificate
        if: runner.os == 'macOS' && env.MACOS_CERTIFICATE != ''
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "" build.keychain
          rm certificate.p12

      # ── Upload artifact ────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error
          retention-days: 7

  # ── Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List artifacts
        run: find release-artifacts -type f | sort

      # Extract changelog entry for this tag
      - name: Extract changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          # Extract section between first ## heading and next ##
          NOTES=$(awk "/^## \\[$VERSION\\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: VaultKey ${{ github.ref_name }}
          body: |
            ## VaultKey ${{ github.ref_name }}

            ${{ steps.changelog.outputs.notes }}

            ---
            ### Downloads
            | Platform | Binary | Notes |
            |---|---|---|
            | Windows 10/11 | `vaultkey.exe` (CLI) | Run directly, no install needed |
            | Windows 10/11 | `vaultkey-gui.exe` (GUI) | Double-click to launch |
            | Linux x86_64 | `vaultkey` (CLI) | `chmod +x vaultkey` then run |
            | Linux x86_64 | `VaultKey-*.AppImage` (GUI) | `chmod +x` then run |
            | macOS 12+ | `vaultkey` (CLI) | May need `xattr -d com.apple.quarantine vaultkey` |
            | macOS 12+ | `VaultKey.app` (GUI) | Unsigned builds: right-click → Open |

            ### Verify integrity
            ```bash
            sha256sum vaultkey*
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            release-artifacts/**/*
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Security scan of built binaries (optional) ──────────────────────────
  security-scan:
    name: Security scan
    needs: build
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: vaultkey-linux-cli
          path: scan-artifacts
        continue-on-error: true

      - name: Run pip-audit
        run: |
          pip install pip-audit
          pip-audit --requirement <(pip freeze) --format=json --output pip-audit.json || true
          cat pip-audit.json

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: security-audit
          path: pip-audit.json
          if-no-files-found: ignore
